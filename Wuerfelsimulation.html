<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Würfelsimulation (6-seitiger fairer Würfel)</title>
<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #f0f2f5;
        color: #333;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    h1 { color: #2c3e50; text-align: center; }
    .container {
        background: #fff;
        padding: 25px 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        max-width: 750px;
        width: 100%;
    }

    /* Würfel */
    .dice {
        width: 90px; height: 90px;
        background: #fff;
        border: 3px solid #2c3e50;
        border-radius: 15px;
        margin: 0 auto 8px auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        padding: 10px;
        box-sizing: border-box;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .dice.rolling { animation: shake 0.5s linear infinite; }
    @keyframes shake {
        0%   { transform: rotate(0deg)   translate(0,0); }
        25%  { transform: rotate(-12deg) translate(-3px,2px); }
        50%  { transform: rotate(10deg)  translate(3px,-2px); }
        75%  { transform: rotate(-8deg)  translate(-2px,-2px); }
        100% { transform: rotate(0deg)   translate(0,0); }
    }
    .pip { width:16px; height:16px; background:#2c3e50; border-radius:50%; align-self:center; justify-self:center; }
    .p-tl{grid-area:1/1;} .p-tr{grid-area:1/3;}
    .p-ml{grid-area:2/1;} .p-mc{grid-area:2/2;} .p-mr{grid-area:2/3;}
    .p-bl{grid-area:3/1;} .p-br{grid-area:3/3;}
    .dice-caption { text-align:center; font-size:12px; color:#888; margin-bottom:18px; }

    /* Steuerung */
    .controls {
        display:flex; flex-wrap:wrap; gap:10px;
        justify-content:center; align-items:center; margin-bottom:25px;
    }
    label { font-weight:bold; }
    input[type="number"] {
        padding:8px; font-size:16px; width:140px;
        border:1px solid #ccc; border-radius:6px;
    }
    button {
        padding:9px 18px; font-size:16px; background:#3498db;
        color:#fff; border:none; border-radius:6px; cursor:pointer; transition:background 0.2s;
    }
    button:hover { background:#2980b9; }
    button:disabled { background:#bbb; cursor:not-allowed; }
    button.reset { background:#95a5a6; }
    button.reset:hover { background:#7f8c8d; }

    /* Diagramm-Bereich mit y-Achse */
    .chart-area {
        display: flex;
        margin-bottom: 5px;
    }
    .y-title {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        text-align: center;
        font-weight: bold;
        color: #555;
        margin-right: 4px;
        font-size: 14px;
    }
    .y-axis {
        position: relative;
        width: 70px;
        height: 320px;
        border-right: 2px solid #333;
    }
    .y-tick {
        position: absolute;
        right: 6px;
        transform: translateY(50%);
        font-size: 12px;
        color: #333;
        white-space: nowrap;
    }
    .y-tick::after { /* kleiner Strich an der Achse */
        content:"";
        position:absolute;
        right:-8px; top:50%;
        width:6px; height:1px; background:#333;
    }

    .chart {
        flex: 1;
        display: flex;
        align-items: flex-end;
        justify-content: space-around;
        height: 320px;
        border-bottom: 2px solid #333;
        padding: 0 10px;
        position: relative;
        background-image: none;
    }
    /* Gitterlinien im Diagramm */
    .gridline {
        position:absolute; left:0; right:0;
        border-top:1px dashed #e0e0e0;
        z-index:0;
    }
    /* Erwartungswert-Linie */
    .expected-line {
        position:absolute; left:0; right:0;
        border-top:2px dashed #e74c3c;
        z-index:2;
    }
    .expected-label {
        position:absolute; right:4px;
        font-size:11px; color:#e74c3c; font-weight:bold;
        transform: translateY(-100%);
        background: rgba(255,255,255,0.7);
        padding: 0 3px;
    }

    .bar-wrapper {
        display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
        height:100%; width:14%; z-index:1;
    }
    .bar-value { font-size:12px; margin-bottom:3px; font-weight:bold; color:#2c3e50; }
    .bar {
        width:100%;
        background:linear-gradient(to top,#3498db,#5dade2);
        border-radius:4px 4px 0 0;
        transition:height 0.6s ease;
        min-height:0;
    }
    .x-labels {
        display:flex; justify-content:space-around;
        padding:0 10px; margin-left:72px;
    }
    .x-labels .lbl { width:14%; text-align:center; font-weight:bold; }
    .x-title { text-align:center; font-weight:bold; margin-top:4px; margin-left:72px; }

    /* Tabelle */
    table { width:100%; border-collapse:collapse; margin-top:20px; text-align:center; }
    th, td { border:1px solid #ccc; padding:8px; }
    th { background:#2c3e50; color:#fff; }
    td.rowhead { background:#ecf0f1; font-weight:bold; text-align:left; }
    .info { text-align:center; color:#666; margin-top:12px; font-size:14px; }
</style>
</head>
<body>

<div class="container">
    <h1>🎲 Würfelsimulation</h1>

    <div id="dice" class="dice"></div>

    <div class="controls">
        <label for="numRolls">Anzahl der Würfe:</label>
        <input type="number" id="numRolls" value="100" min="1" max="1000000">
        <button id="rollBtn" onclick="startSimulation()">Würfeln</button>
        <button class="reset" onclick="resetAll()">Zurücksetzen</button>
    </div>

    <!-- Diagramm mit y-Achse -->
    <div class="chart-area">
        <div class="y-title">Absolute Häufigkeit</div>
        <div id="yAxis" class="y-axis"></div>
        <div id="chart" class="chart"></div>
    </div>
    <div id="xLabels" class="x-labels"></div>
    <div class="x-title">Augenzahl</div>

    <!-- Tabelle -->
    <table id="resultTable">
        <thead>
            <tr>
                <th>Augenzahl</th>
                <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="rowhead">Absolute Häufigkeit</td>
                <td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td>
            </tr>
            <tr>
                <td class="rowhead">Relative Häufigkeit</td>
                <td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td>
            </tr>
        </tbody>
    </table>

   
</div>

<script>
    const CHART_HEIGHT = 320; // muss zu CSS passen
    const NUM_TICKS = 5;      // Anzahl Skalen-Abschnitte

    const pipLayouts = {
        1:['p-mc'], 2:['p-tl','p-br'], 3:['p-tl','p-mc','p-br'],
        4:['p-tl','p-tr','p-bl','p-br'],
        5:['p-tl','p-tr','p-mc','p-bl','p-br'],
        6:['p-tl','p-tr','p-ml','p-mr','p-bl','p-br']
    };

    function drawDice(value) {
        const dice = document.getElementById('dice');
        dice.innerHTML = '';
        pipLayouts[value].forEach(pos => {
            const pip = document.createElement('div');
            pip.className = 'pip ' + pos;
            dice.appendChild(pip);
        });
    }
    drawDice(6);

    // x-Beschriftung einmal aufbauen
    (function buildXLabels(){
        const box = document.getElementById('xLabels');
        for(let i=1;i<=6;i++){
            const d=document.createElement('div');
            d.className='lbl'; d.textContent=i;
            box.appendChild(d);
        }
    })();

    function startSimulation() {
        const input = document.getElementById('numRolls');
        let n = parseInt(input.value);
        if (isNaN(n) || n < 1) { alert("Bitte eine gültige Zahl (mindestens 1) eingeben."); return; }
        if (n > 1000000) { n = 1000000; input.value = 1000000; }

        // Würfel-Roll-Animation als Feedback
        const dice = document.getElementById('dice');
        const btn = document.getElementById('rollBtn');
        btn.disabled = true;
        dice.classList.add('rolling');

        let ticks = 0;
        const shuffle = setInterval(() => {
            drawDice(Math.floor(Math.random()*6)+1);
            ticks++;
        }, 80);

        // nach kurzer Animation die eigentliche Simulation ausführen
        setTimeout(() => {
            clearInterval(shuffle);
            dice.classList.remove('rolling');
            drawDice(Math.floor(Math.random()*6)+1);
            runSimulation(n);
            btn.disabled = false;
        }, 700);
    }

    function runSimulation(n) {
        // Würfe zählen
        const counts = [0,0,0,0,0,0];
        for (let i=0;i<n;i++){ counts[Math.floor(Math.random()*6)]++; }

        // y-Achse: Maximum = Gesamtanzahl n
        buildYAxis(n);

        // Säulen
        const chart = document.getElementById('chart');
        chart.innerHTML = '';

        // Gitterlinien
        for (let t=0; t<=NUM_TICKS; t++){
            const gl=document.createElement('div');
            gl.className='gridline';
            gl.style.bottom = (t/NUM_TICKS*100) + '%';
            chart.appendChild(gl);
        }

 
        // Balken (Höhe relativ zu n -> entspricht relativer Häufigkeit)
        for (let i=0;i<6;i++){
            const wrap=document.createElement('div'); wrap.className='bar-wrapper';
            const val=document.createElement('div'); val.className='bar-value'; val.textContent=counts[i];
            const bar=document.createElement('div'); bar.className='bar';
            bar.style.height = (counts[i]/n*100) + '%';
            wrap.appendChild(val); wrap.appendChild(bar);
            chart.appendChild(wrap);
        }

        // Tabelle
        const rows=document.getElementById('resultTable').tBodies[0].rows;
        for(let i=0;i<6;i++){
            rows[0].cells[i+1].textContent = counts[i].toLocaleString('de-DE');
            rows[1].cells[i+1].textContent = (counts[i]/n*100).toFixed(2)+'%';
        }

    
    }

    function buildYAxis(n) {
        const yAxis=document.getElementById('yAxis');
        yAxis.innerHTML='';
        for (let t=0; t<=NUM_TICKS; t++){
            const value = Math.round(n * t / NUM_TICKS);
            const tick=document.createElement('div');
            tick.className='y-tick';
            tick.style.bottom = (t/NUM_TICKS*100) + '%';
            tick.textContent = value.toLocaleString('de-DE');
            yAxis.appendChild(tick);
        }
    }

    function resetAll() {
        document.getElementById('numRolls').value = 100;
        drawDice(6);
        document.getElementById('chart').innerHTML = '';
        document.getElementById('yAxis').innerHTML = '';
        const rows=document.getElementById('resultTable').tBodies[0].rows;
        for(let i=0;i<6;i++){ rows[0].cells[i+1].textContent='0'; rows[1].cells[i+1].textContent='0'; }
        document.getElementById('info').textContent = "Noch keine Würfe durchgeführt.";
    }
</script>

</body>
</html>
